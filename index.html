<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Links</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f5f5f5;
      }
      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        font-weight: 700;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      a {
        display: block;
        padding: 16px;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        text-decoration: none;
        background: #181818;
      }
      a:hover { border-color: #666; }
      span {
        display: block;
        margin-top: 6px;
        color: #aaa;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Video Links</h1>
      <div class="grid">
        <a href="./video1.html">Video 1<span>Open player page</span></a>
        <a href="./video2.html">Video 2<span>Open player page</span></a>
        <a href="./video3.html">Video 3<span>Open player page</span></a>
      </div>
    </main>
  </body>
</html>
